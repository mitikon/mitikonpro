<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬AI投資システム Ver 3.5 (Deep Insight Model)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --myaku-red: #E60012;
            --myaku-blue: #0071BC;
            --myaku-white: #FFFFFF;
        }
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; padding: 20px;
            background-image: radial-gradient(var(--myaku-blue) 1px, transparent 1px);
            background-size: 30px 30px; 
        }
        .container { 
            max-width: 900px; margin: auto; background: var(--myaku-white); 
            padding: 30px; border-radius: 40px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 8px solid var(--myaku-red);
        }
        
        .header-logo { text-align: center; margin-bottom: 20px; position: relative; }
        .header-logo img { width: 100px; height: auto; }
        h1 { 
            text-align: center; color: var(--myaku-red); font-size: 26px; font-weight: 900;
            margin-top: 10px; text-shadow: 2px 2px 0px var(--myaku-white), 4px 4px 0px rgba(0,113,188,0.2);
        }

        .setup-box { background: #fff1f2; padding: 20px; border-radius: 20px; border: 3px solid var(--myaku-blue); margin-bottom: 25px; position: relative; }
        .instruction { font-size: 15px; color: #333; line-height: 1.6; font-weight: 700; }
        
        .copy-btn {
            display: block; width: 100%; max-width: 450px; margin: 15px auto; 
            background: var(--myaku-red); color: white; border: 4px solid var(--myaku-blue);
            padding: 16px; font-size: 18px; font-weight: 900; border-radius: 50px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0px #90000b;
        }
        .copy-btn:hover { transform: scale(1.02); background: #ff0015; }

        .input-area-wrapper {
            border: 5px solid var(--myaku-blue); background-color: #e6f4ff;
            padding: 20px; border-radius: 25px; margin-bottom: 25px; text-align: center;
        }
        .input-area-wrapper::before {
            content: '👀 AI抽出データ（全15項目）をここに貼り付けて！ 👀';
            display: block; font-size: 18px; font-weight: 900; color: var(--myaku-red); margin-bottom: 15px;
        }
        textarea { 
            width: 100%; padding: 15px; border: 3px solid var(--myaku-red); border-radius: 15px; 
            font-family: monospace; font-size: 14px; box-sizing: border-box; background: white;
        }

        .btn-group { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .action-btn { 
            padding: 18px; font-size: 20px; font-weight: 900; border-radius: 50px; 
            cursor: pointer; border: none; transition: 0.2s; width: 45%; 
        }
        .calc-btn { background: var(--myaku-blue); color: white; box-shadow: 0 6px 0px #004d80; border: 4px solid var(--myaku-red); }
        .reset-btn { background: #718096; color: white; box-shadow: 0 6px 0px #4a5568; }

        #results { display: none; }
        .judgement-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .j-box { padding: 25px; border-radius: 30px; text-align: center; border: 6px solid; position: relative; }
        .win-box { border-color: var(--myaku-red); background: #fff5f5; }
        .place-box { border-color: var(--myaku-blue); background: #f0f9ff; }
        .j-label { font-size: 14px; font-weight: 900; color: #333; margin-bottom: 10px; }
        
        .j-horse, .horse-number { font-size: 18px !important; font-weight: 900 !important; color: #000; }
        .j-horse { font-size: 32px !important; color: var(--myaku-red); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { background: var(--myaku-blue); color: white; padding: 15px; border-radius: 10px; }
        td { background: white; padding: 15px; border-top: 2px solid var(--myaku-red); border-bottom: 2px solid var(--myaku-red); text-align: center; }
        td:first-child { border-left: 2px solid var(--myaku-red); border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 2px solid var(--myaku-red); border-radius: 0 15px 15px 0; }
        .log-text { text-align: left; font-size: 12px; font-weight: bold; color: #444; line-height: 1.5; }
        .score-val { font-weight: bold; color: #E60012; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="https://www.expo2025.or.jp/wp/wp-content/themes/expo2025/assets/images/character/img_character.png" alt="ミャクミャク">
        <h1>競馬AI投資システム Ver 3.5<br><span style="font-size:16px; color:#0071BC;">(Deep Insight Model)</span></h1>
    </div>

    <div class="setup-box">
        <div class="instruction">
            🔴 【重要】抽出項目が「全15項目」に超進化しました！<br>
            🔵 下のボタンで指示文をコピーし、AIに画像を解析させてください。<br>
            🔴 亀谷ランクと騎手期待値の「ねじれ」をAIが暴き出します。
        </div>
        <button class="copy-btn" onclick="copyPrompt()">👁 AI用データ解析指示暗号(15項目版)をコピー</button>
    </div>

    <div class="input-area-wrapper">
        <textarea id="csv-input" rows="8" placeholder="馬番,亀谷ランク,騎手勝率,騎手連対率,騎手複勝率...&#13;&#10;（ここにデータをペースト）"></textarea>
    </div>

    <div class="btn-group">
        <button class="action-btn calc-btn" onclick="runAnalysis()">🚀 脈動・深層解析を実行</button>
        <button class="action-btn reset-btn" onclick="resetAll()">🗑 全クリア</button>
    </div>

    <div id="results">
        <div class="judgement-grid">
            <div class="j-box win-box">
                <div class="j-label">🔴 鉄板軸・単勝推奨</div>
                <div class="j-horse" id="win-res">無し</div>
            </div>
            <div class="j-box place-box">
                <div class="j-label">🔵 激走穴・複勝/ワイド相手</div>
                <div class="j-horse" id="place-res">無し</div>
            </div>
        </div>

        <table id="score-table">
            <thead>
                <tr>
                    <th>馬番</th>
                    <th>細胞スコア</th>
                    <th>深層判定ログ（ランク×騎手・展開・確率）</th>
                </tr>
            </thead>
            <tbody id="score-body"></tbody>
        </table>
    </div>
</div>

<script>
function copyPrompt() {
    const p = `以下の画像から全15項目のCSVを作成してください。
1行目:レース名。2行目以降:
馬番,亀谷ランク,ランク別騎手勝率,ランク別騎手連対率,ランク別騎手複勝率,ランク別騎手複勝回収率,馬単勝率,馬単勝回収率,馬複勝率,馬複勝回収率,条件別馬単勝回収率,条件別馬複勝回収率,上がり3F,4角ポジション,推進力

※亀谷ランク:A〜F
※ランク別騎手データ:該当ランクに騎乗した際の騎手成績(%)
※4角ポジション:緑ゾーンなら5、圏外なら1
※挨拶不要。CSVコードのみを出力すること。`;
    navigator.clipboard.writeText(p);
    alert("AIへのデータ解析指示暗号(深層15項目版)をコピーしました！");
}

function runAnalysis() {
    const input = document.getElementById('csv-input').value.trim();
    if(!input) { alert("データを貼り付けてください。"); return; }

    const lines = input.split('\n');
    const data = [];
    const startIndex = lines[0].includes(',') && !lines[0].includes('馬番') ? 0 : (lines[0].includes('馬番') ? 1 : 1);

    for(let i=startIndex; i<lines.length; i++) {
        if(!lines[i].trim()) continue;
        const c = lines[i].split(',');
        
        // 15項目抽出に対応
        if(c.length < 15) continue;

        let d = {
            num: c[0].trim(), kameRank: c[1].trim(), 
            jockW: parseFloat(c[2]), jockQ: parseFloat(c[3]), jockP: parseFloat(c[4]), jockPRet: parseFloat(c[5]),
            winR: parseFloat(c[6]), winRet: parseFloat(c[7]), plaR: parseFloat(c[8]), plaRet: parseFloat(c[9]),
            cWinRet: parseFloat(c[10]), cPlaRet: parseFloat(c[11]), 
            up3: parseFloat(c[12]), pos: parseFloat(c[13]), push: parseFloat(c[14])
        };

        // ノイズフィルター
        if(d.winRet > 300) d.winRet = 80;
        if(d.plaRet > 300) d.plaRet = 70;

        let score = 0; let log = "";

        // 1. ベース期待値と馬の安定感
        score += (d.winRet * 0.3) + (d.plaRet * 0.3);
        score += (d.plaR * 1.5);
        log += `基礎値:${((d.winRet*0.3)+(d.plaRet*0.3)+(d.plaR*1.5)).toFixed(0)} | `;

        // 2. 騎手×ランクのディープインサイト (人間に読めない優位性)
        if (d.kameRank === 'A' || d.kameRank === 'B') {
            if (d.jockQ < 30) {
                // 人気馬なのに騎手連対率が低い = 危険なトラップ
                score -= 50;
                log += `⚠️過剰人気トラップ(-50) `;
            } else if (d.jockQ >= 40) {
                // 人気馬でしっかり連対する = 信頼の軸
                score += 40;
                log += `👑鉄板騎手(+40) `;
            }
        }
        
        if (d.kameRank === 'D' || d.kameRank === 'E' || d.kameRank === 'F') {
            if (d.jockP >= 20 && d.jockPRet >= 100) {
                // 穴馬なのに高確率＆高回収率 = 究極の妙味
                score += 50;
                log += `💎超・穴妙味騎手(+50) `;
            } else if (d.jockP >= 15) {
                score += 25;
                log += `✨穴好走騎手(+25) `;
            }
        }

        // 3. 物理エンジン・条件適性
        if(d.cPlaRet >= 100) { score += 15; log += `🎖️条件(+15) `; }
        if(d.pos >= 4) { score += 40; log += `🎯Gゾーン(+40) `; }
        else if(d.pos <= 2) { score -= 30; log += `⛔絶望位置(-30) `; }
        if(d.push >= 4) { score += 20; log += `🚀推進力(+20) `; }
        if(d.up3 <= 3) { score += 20; log += `🗡️末脚(+20) `; }

        data.push({num: d.num, score: score, log: log});
    }

    if(data.length === 0) { alert("データの形式エラーです。15項目が抽出されているか確認してください。"); return; }

    data.sort((a,b) => b.score - a.score);
    const body = document.getElementById('score-body');
    body.innerHTML = "";
    data.forEach(r => {
        body.innerHTML += `<tr><td class="horse-number">${r.num}</td><td class="score-val">${r.score.toFixed(1)}</td><td class="log-text">${r.log}</td></tr>`;
    });

    // 閾値を調整（加点・減点が大きいため）
    document.getElementById('win-res').innerText = data[0].score > 160 ? `${data[0].num}` : "無し";
    const pBest = data.filter(r => r.score > 130).slice(0, 2).map(r => r.num);
    document.getElementById('place-res').innerText = pBest.length ? `${pBest.join(' , ')}` : "無し";
    document.getElementById('results').style.display = 'block';
}

function resetAll() {
    document.getElementById('csv-input').value = "";
    document.getElementById('results').style.display = "none";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
