<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>次世代競馬金融工学AIシステム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f0f2f5;
            margin: 0; padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px; margin: 0 auto;
            background: white; border-radius: 12px;
            padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: #1a365d; font-size: 24px; border-bottom: 3px solid #1a365d; padding-bottom: 10px; }
        
        /* 運用フロー枠 */
        .instruction-box {
            background-color: #f8faff; border: 1px solid #d0e1f9;
            border-radius: 8px; padding: 15px; margin-bottom: 20px;
            font-size: 14px;
        }
        .instruction-box p { margin: 5px 0; color: #2b6cb0; font-weight: 700; }
        
        /* ボタン類 */
        .btn {
            display: block; width: 100%; padding: 15px;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; text-align: center; margin-bottom: 10px;
            color: white; transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        .btn-copy { background-color: #3182ce; width: auto; margin: 10px auto; padding: 10px 30px; }
        .btn-execute { background-color: #e53e3e; margin-top: 15px;}
        .btn-reset { background-color: #718096; }
        
        /* テキストエリア */
        textarea {
            width: 100%; height: 180px; padding: 10px;
            border: 1px solid #cbd5e0; border-radius: 8px;
            font-size: 14px; box-sizing: border-box; resize: none;
        }

        /* レポート結果枠 */
        #report-area { display: none; margin-top: 30px; }
        .report-box {
            background-color: #f8f9fa; border-left: 5px solid #1a365d;
            padding: 15px; border-radius: 5px; font-weight: 700; margin-bottom: 20px;
        }
        
        /* S〜G ランクカード */
        .rank-card {
            border-radius: 12px; padding: 15px 20px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .bg-S { background: linear-gradient(135deg, #F0C27B 0%, #4B1248 100%); }
        .bg-A { background: linear-gradient(135deg, #FF416C 0%, #FF4B2B 100%); }
        .bg-B { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); }
        .bg-C { background: linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%); }
        .bg-G { background: linear-gradient(135deg, #434343 0%, #000000 100%); }
        
        .horse-info { font-size: 16px; font-weight: 700; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .rank-badge {
            font-size: 18px; font-weight: 900; background: rgba(255,255,255,0.25);
            padding: 5px 15px; border-radius: 8px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>次世代競馬金融工学システム Ver 4.0</h1>
    
    <div class="instruction-box">
        <p>【中川理論・運用フロー】</p>
        1. 下のボタンでAIへの抽出指示文をコピーし、新規チャットでAIに送信。<br>
        2. 各種画像（JRA、亀谷、netkeiba）をAIに読み込ませる。<br>
        3. 出力されたCSVを下の欄に貼り付け、「投資判断を実行」を押す。
        
        <button class="btn btn-copy" onclick="copyPrompt()">📋 AI用データ抽出指示文をコピー</button>
    </div>

    <textarea id="csvInput" placeholder="ここにGeminiから出力されたCSVデータを貼り付けてください..."></textarea>
    
    <button class="btn btn-execute" onclick="executeAnalysis()">🎯 投資判断を実行 (中川理論エンジン)</button>
    <button class="btn btn-reset" onclick="resetData()">🗑 リセット</button>

    <div id="report-area">
        <h2 style="font-size: 20px; color: #1a365d;">💰 投資判定レポート</h2>
        <div id="summary-box" class="report-box"></div>
        <h2 style="font-size: 20px; color: #1a365d; margin-top: 30px;">📋 各馬の解析ステータス</h2>
        <div id="cards-area"></div>
    </div>
</div>

<script>
    // 新規AIに渡す「魔法の指示文（プロンプト）」
    const aiPrompt = `あなたは金融工学と中川理論（リードラグ効果・部分空間PCA）に基づく競馬データアナリストです。
添付された画像（JRA公式オッズ、亀谷スマート出馬表、netkeiba AI展開予測）を解析し、以下のルールでCSVデータを出力してください。

【抽出・算出要件】
1. 馬番: 抽出対象の馬番
2. 朝一インプライド確率: 単勝オッズから逆算した市場予測勝率（例: 単勝5.0倍なら 0.20）
3. JRA複勝オッズ下限: JRA公式の複勝オッズ下限値
4. 亀谷_血統適性: 画像から読み取る血統・コース適性を1〜5で評価（5が最高）
5. netkeiba_AI展开適合度: 展開ヒートマップのポジションの良さを1〜5で評価（5が最高）
6. nakagawa_predicted_edge: 中川理論に基づく期待値の歪み。「真の好走確率 － 朝一インプライド確率」で算出し、オッズが過小評価されている馬ほどプラス値（例: 0.05）、危険な過剰人気馬はマイナス値（例: -0.08）として出力すること。

【出力形式】（厳守：挨拶や解説は一切不要。CSVのみを出力すること）
馬番,朝一インプライド確率,JRA複勝オッズ下限,亀谷_血統適性,netkeiba_AI展开適合度,nakagawa_predicted_edge`;

    // コピー機能
    function copyPrompt() {
        navigator.clipboard.writeText(aiPrompt).then(() => {
            alert("AI用の指示文をクリップボードにコピーしました！\n新規チャットに貼り付けてください。");
        }).catch(err => {
            alert("コピーに失敗しました。手動でコピーしてください。");
        });
    }

    // リセット機能
    function resetData() {
        document.getElementById('csvInput').value = '';
        document.getElementById('report-area').style.display = 'none';
    }

    // CSVパースと中川理論ロジック実行
    function executeAnalysis() {
        const csvText = document.getElementById('csvInput').value.trim();
        if (!csvText) {
            alert("データが入力されていません。");
            return;
        }

        const lines = csvText.split('\n');
        let horses = [];
        
        try {
            // ヘッダーをスキップしてデータ行を処理
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(',');
                if (cols.length < 6) continue;

                let h = {
                    number: parseInt(cols[0]),
                    prob: parseFloat(cols[1]),
                    oddsMin: parseFloat(cols[2]),
                    kameya: parseInt(cols[3]),
                    netkeiba: parseInt(cols[4]),
                    edge: parseFloat(cols[5]),
                    rank: 'C'
                };

                // 中川理論 S〜Gランク判定ロジック
                if (h.edge < -0.05 && h.prob > 0.15) {
                    h.rank = 'G';
                } else if (h.edge >= 0.05 && h.netkeiba >= 4 && h.kameya >= 4 && (h.edge / (1.0 / h.oddsMin)) > 1.2) {
                    h.rank = 'S';
                } else if (h.edge >= 0.03 && h.netkeiba >= 3) {
                    h.rank = 'A';
                } else if (h.edge >= 0.02 || h.netkeiba === 5) {
                    h.rank = 'B';
                }
                horses.push(h);
            }

            // エッジの高い順にソート
            horses.sort((a, b) => b.edge - a.edge);
            generateReport(horses);

        } catch (e) {
            alert("データの形式エラーです。CSVが正しく貼り付けられているか確認してください。");
        }
    }

    // レポートとUIの描画
    function generateReport(horses) {
        const s_horses = horses.filter(h => h.rank === 'S');
        const a_horses = horses.filter(h => h.rank === 'A');
        const b_horses = horses.filter(h => h.rank === 'B');
        const g_horses = horses.filter(h => h.rank === 'G');

        let reportHtml = "";

        if (g_horses.length > 0) {
            const gNums = g_horses.map(h => h.number).join(', ');
            reportHtml += `<p>⚠️ 危険な人気馬(Gランク)を検出: ${gNums}番 -> 市場の歪み発生中</p>`;
        }

        let core_horse = null;
        if (s_horses.length === 1) {
            core_horse = s_horses[0];
            reportHtml += `<p>🎯 【絶対軸】Sランク: ${core_horse.number}番 (エッジ予測: ${(core_horse.edge*100).toFixed(1)}%)</p>`;
        } else if (a_horses.length === 1 && s_horses.length === 0) {
            core_horse = a_horses[0];
            reportHtml += `<p>🎯 【積極軸】Aランク: ${core_horse.number}番 (エッジ予測: ${(core_horse.edge*100).toFixed(1)}%)</p>`;
        } else {
            reportHtml += `<p style="color:red;">❌ 【ケン推奨】 信頼できる単独軸馬(S/Aランク)が不在です。</p>`;
        }

        if (core_horse) {
            let partners = [...s_horses, ...a_horses, ...b_horses].filter(h => h.number !== core_horse.number);
            partners.sort((a, b) => b.edge - a.edge);
            partners = partners.slice(0, 2);

            reportHtml += `<hr><p>💰 --- ポートフォリオ（買い目） ---</p>`;
            reportHtml += `<p>🛡️ 【防衛・複勝】 ${core_horse.number}番 (資金70%)</p>`;
            
            if (partners.length > 0) {
                const pNums = partners.map(h => h.number).join(', ');
                reportHtml += `<p>⚔️ 【攻撃・ワイド】 ${core_horse.number} - [ ${pNums} ] (資金30%)</p>`;
            } else {
                reportHtml += `<p>⚔️ 【攻撃・ワイド】 該当相手なし -> 複勝1点で完全防衛</p>`;
            }
        }

        document.getElementById('summary-box').innerHTML = reportHtml;

        // S〜Gランクカードの描画
        let cardsHtml = "";
        horses.forEach(h => {
            const bgClass = ['S', 'A', 'B', 'C', 'G'].includes(h.rank) ? `bg-${h.rank}` : 'bg-C';
            cardsHtml += `
            <div class="rank-card ${bgClass}">
                <div class="horse-info">🏇 ${h.number}番 (エッジ: ${(h.edge*100).toFixed(1)}%)</div>
                <div class="rank-badge">RANK ${h.rank}</div>
            </div>`;
        });
        
        document.getElementById('cards-area').innerHTML = cardsHtml;
        document.getElementById('report-area').style.display = 'block';
    }
</script>

</body>
</html>
