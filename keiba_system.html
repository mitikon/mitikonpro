<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬AI投資システム (Absolute Position 復旧版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --myaku-red: #E60012; --myaku-blue: #0071BC; --myaku-white: #FFFFFF; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; background-image: radial-gradient(var(--myaku-blue) 1px, transparent 1px); background-size: 30px 30px; }
        .container { max-width: 900px; margin: auto; background: var(--myaku-white); padding: 30px; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 8px solid var(--myaku-red); }
        .header-logo { text-align: center; margin-bottom: 20px; }
        .header-logo img { width: 100px; height: auto; }
        h1 { text-align: center; color: var(--myaku-red); font-size: 26px; font-weight: 900; margin-top: 10px; text-shadow: 2px 2px 0px var(--myaku-white), 4px 4px 0px rgba(0,113,188,0.2); }
        .setup-box { background: #fff1f2; padding: 20px; border-radius: 20px; border: 3px solid var(--myaku-blue); margin-bottom: 25px; }
        .instruction { font-size: 15px; color: #333; line-height: 1.6; font-weight: 700; }
        .copy-btn { display: block; width: 100%; max-width: 450px; margin: 15px auto; background: var(--myaku-red); color: white; border: 4px solid var(--myaku-blue); padding: 16px; font-size: 18px; font-weight: 900; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0px #90000b; }
        .copy-btn:hover { transform: scale(1.02); background: #ff0015; }
        .input-area-wrapper { border: 5px solid var(--myaku-blue); background-color: #e6f4ff; padding: 20px; border-radius: 25px; margin-bottom: 25px; text-align: center; }
        .input-area-wrapper::before { content: '👀 AI抽出データ（確実な10項目）をここに貼り付け 👀'; display: block; font-size: 18px; font-weight: 900; color: var(--myaku-red); margin-bottom: 15px; }
        textarea { width: 100%; padding: 15px; border: 3px solid var(--myaku-red); border-radius: 15px; font-family: monospace; font-size: 14px; box-sizing: border-box; background: white; }
        .btn-group { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .action-btn { padding: 18px; font-size: 20px; font-weight: 900; border-radius: 50px; cursor: pointer; border: none; transition: 0.2s; width: 45%; }
        .calc-btn { background: var(--myaku-blue); color: white; box-shadow: 0 6px 0px #004d80; border: 4px solid var(--myaku-red); }
        .reset-btn { background: #718096; color: white; box-shadow: 0 6px 0px #4a5568; }
        #results { display: none; }
        .judgement-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .j-box { padding: 25px; border-radius: 30px; text-align: center; border: 6px solid; position: relative; }
        .win-box { border-color: var(--myaku-red); background: #fff5f5; }
        .place-box { border-color: var(--myaku-blue); background: #f0f9ff; }
        .j-label { font-size: 14px; font-weight: 900; color: #333; margin-bottom: 10px; }
        .j-horse, .horse-number { font-size: 18px !important; font-weight: 900 !important; color: #000; }
        .j-horse { font-size: 32px !important; color: var(--myaku-red); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { background: var(--myaku-blue); color: white; padding: 15px; border-radius: 10px; }
        td { background: white; padding: 15px; border-top: 2px solid var(--myaku-red); border-bottom: 2px solid var(--myaku-red); text-align: center; }
        td:first-child { border-left: 2px solid var(--myaku-red); border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 2px solid var(--myaku-red); border-radius: 0 15px 15px 0; }
        .log-text { text-align: left; font-size: 12px; font-weight: bold; color: #444; line-height: 1.5; }
        .score-val { font-weight: bold; color: #E60012; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="https://www.expo2025.or.jp/wp/wp-content/themes/expo2025/assets/images/character/img_character.png" alt="ミャクミャク">
        <h1>競馬AI投資システム<br><span style="font-size:16px; color:#0071BC;">(Absolute Position 復旧版)</span></h1>
    </div>

    <div class="setup-box">
        <div class="instruction">
            🔴 【警告】抽出項目を最も正確だった「10項目」に復旧しました。<br>
            🔵 複雑なAIの推測を排除し、事実データ（展開・推進力・回収率）のみで勝負します。<br>
            🔴 下のボタンで指示文をコピーし、AIに抽出させてください。
        </div>
        <button class="copy-btn" onclick="copyPrompt()">👁 AI用データ解析指示（確実10項目）をコピー</button>
    </div>

    <div class="input-area-wrapper">
        <textarea id="csv-input" rows="8" placeholder="馬番,単勝率,単勝回収率,複勝率,複勝回収率...&#13;&#10;（ここにデータをペースト）"></textarea>
    </div>

    <div class="btn-group">
        <button class="action-btn calc-btn" onclick="runAnalysis()">🚀 脈動・物理解析を実行</button>
        <button class="action-btn reset-btn" onclick="resetAll()">🗑 全クリア</button>
    </div>

    <div id="results">
        <div class="judgement-grid">
            <div class="j-box win-box">
                <div class="j-label">🔴 物理エンジン覇者・単勝推奨</div>
                <div class="j-horse" id="win-res">無し</div>
            </div>
            <div class="j-box place-box">
                <div class="j-label">🔵 ゴールデンゾーン・複勝相手</div>
                <div class="j-horse" id="place-res">無し</div>
            </div>
        </div>

        <table id="score-table">
            <thead>
                <tr>
                    <th>馬番</th>
                    <th>総合スコア</th>
                    <th>判定ログ（物理エンジン & 期待値解析）</th>
                </tr>
            </thead>
            <tbody id="score-body"></tbody>
        </table>
    </div>
</div>

<script>
function copyPrompt() {
    const p = `以下の画像から全10項目のCSVデータを作成してください。
1行目:レース名。2行目以降:
馬番,単勝率,単勝回収率,複勝率,複勝回収率,条件別単勝回収率,条件別複勝回収率,上がり3F平均順位,4角ポジション適合度,推進力スコア

※4角ポジション適合度:ヒートマップの緑ゾーンなら5、圏外なら1。
※推進力スコア:道中で位置を上げているか、好位で力が残っている馬を5段階で。
※挨拶や解説は不要。CSVのみを出力すること。`;
    navigator.clipboard.writeText(p);
    alert("AIへの指示文（確実な10項目版）をコピーしました！");
}

function runAnalysis() {
    const input = document.getElementById('csv-input').value.trim();
    if(!input) { alert("データを貼り付けてください。"); return; }

    const lines = input.split('\n');
    const data = [];
    const startIndex = lines[0].includes(',') && !lines[0].includes('馬番') ? 0 : (lines[0].includes('馬番') ? 1 : 1);

    for(let i=startIndex; i<lines.length; i++) {
        if(!lines[i].trim()) continue;
        const c = lines[i].split(',');
        
        // Ver 3.0の10項目抽出に戻す
        if(c.length < 10) continue;

        let d = {
            num: c[0].trim(), winR: parseFloat(c[1]), winRet: parseFloat(c[2]),
            plaR: parseFloat(c[3]), plaRet: parseFloat(c[4]),
            cWinRet: parseFloat(c[5]), cPlaRet: parseFloat(c[6]),
            up3: parseFloat(c[7]), pos: parseFloat(c[8]), push: parseFloat(c[9])
        };

        // 異常値フィルター
        if(d.winRet > 300) d.winRet = 80;
        if(d.plaRet > 300) d.plaRet = 70;

        let score = 0; let log = "";

        // 1. 期待値ベース（Ver 3.0の最強ロジック完全復旧）
        score += d.winRet * 0.5 + d.plaRet * 0.5;
        log += `ベース期待値:${score.toFixed(0)} | `;

        // 2. 物理エンジン（Netkeiba AI融合）
        if(d.pos >= 4) {
            score += 40;
            log += `🎯Gゾーン(+40) `;
        } else if(d.pos <= 2) {
            score -= 30;
            log += `⚠️絶望ポジション(-30) `;
        }

        if(d.push >= 4) {
            score += 30;
            log += `🚀推進力優秀(+30) `;
        }

        // 3. 末脚の真贋判定
        if(d.up3 <= 3.0 && d.pos >= 3) {
            score += 25;
            log += `🛡️末脚裏付け(+25) `;
        }

        data.push({num: d.num, score: score, log: log});
    }

    if(data.length === 0) { alert("データの形式エラーです。正しく10項目が抽出されているか確認してください。"); return; }

    data.sort((a,b) => b.score - a.score);
    const body = document.getElementById('score-body');
    body.innerHTML = "";
    data.forEach(r => {
        body.innerHTML += `<tr><td class="horse-number">${r.num}</td><td class="score-val">${r.score.toFixed(1)}</td><td class="log-text">${r.log}</td></tr>`;
    });

    document.getElementById('win-res').innerText = data[0].score > 140 ? `${data[0].num}` : "無し";
    const pBest = data.filter(r => r.score > 120).slice(0, 2).map(r => r.num);
    document.getElementById('place-res').innerText = pBest.length ? `${pBest.join(' , ')}` : "無し";
    document.getElementById('results').style.display = 'block';
}

function resetAll() {
    document.getElementById('csv-input').value = "";
    document.getElementById('results').style.display = "none";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
